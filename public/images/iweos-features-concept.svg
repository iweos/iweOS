    <text x="345" y="343" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Classes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="130" width="390" height="260" rx="24" fill="url(#card)" stroke="#E3D4BE"/>
    <text x="532" y="177" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#7A4F28">Payments</text>
    <rect x="532" y="198" width="326" height="72" rx="14" fill="#EAF3EC"/>
    <text x="554" y="228" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#2F6B3F">Collection Rate</text>
