    <text x="552" y="316" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#7A4F28">Invoices</text>
    <text x="552" y="340" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#111827">1,248</text>
    <rect x="702" y="286" width="156" height="72" rx="14" fill="#EAF3EC"/>
    <text x="722" y="316" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#2F6B3F">Outstanding</text>
    <text x="722" y="340" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#111827">N2.6m</text>
