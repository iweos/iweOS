    <text x="204" y="553" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#374151">admin and teacher role guards</text>
    <circle cx="186" cy="581" r="8" fill="#2F6B3F"/>
    <text x="204" y="586" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#374151">server-side grade and payment validation</text>
