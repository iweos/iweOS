<svg width="960" height="720" viewBox="0 0 960 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="900" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6E7"/>
      <stop offset="1" stop-color="#F3E0C5"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF9F1"/>
