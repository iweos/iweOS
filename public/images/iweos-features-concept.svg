    <filter id="shadow" x="0" y="0" width="960" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="720" rx="44" fill="url(#bg)"/>
  <circle cx="130" cy="110" r="44" fill="#E6F0E8"/>
  <circle cx="178" cy="110" r="22" fill="#8E5A2B"/>
  <circle cx="222" cy="110" r="15" fill="#2F6B3F"/>

  <g filter="url(#shadow)">
    <rect x="70" y="165" width="390" height="230" rx="24" fill="url(#card)" stroke="#E3D4BE"/>
